<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>El Cuento de Mati</title><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;background:#1a1a2e;touch-action:manipulation;-webkit-user-select:none;user-select:none}#app{width:100%;height:100%;position:relative;overflow:hidden}.page{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none}.page.active{opacity:1;pointer-events:all}.page.sir{animation:sir .5s ease forwards}.page.sol{animation:sol .5s ease forwards}.page.sil{animation:sil .5s ease forwards}.page.sor{animation:sor .5s ease forwards}@keyframes sir{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}@keyframes sol{from{transform:translateX(0);opacity:1}to{transform:translateX(-100%);opacity:0}}@keyframes sil{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}@keyframes sor{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}.nb{position:absolute;bottom:20px;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.5);color:#fff;padding:12px 24px;border-radius:30px;font-size:1rem;cursor:pointer;z-index:100;backdrop-filter:blur(4px)}.nb:active{transform:scale(.95)}.nb.l{left:16px}.nb.r{right:16px}.nb.h{display:none}.st{color:#fff;font-size:1.05rem;text-align:center;max-width:90%;line-height:1.6;min-height:2.5em;text-shadow:0 1px 3px rgba(0,0,0,.5);margin:8px 0}.p1{background:linear-gradient(180deg,#87CEEB 0%,#87CEEB 55%,#7EC850 55%,#4a8c2a 100%)}.p5{background:linear-gradient(180deg,#667eea 0%,#764ba2 100%)}.pm{background:radial-gradient(ellipse at center,#1a0505 0%,#0d0202 100%)}@keyframes bounce{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-6px) rotate(3deg)}}@keyframes shimmer{0%{opacity:0;left:-20%}50%{opacity:.8}100%{opacity:0;left:120%}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:.7}}@keyframes cloud-move{0%{transform:translateX(-100px)}100%{transform:translateX(calc(100vw + 100px))}}@keyframes typewriter{from{opacity:0}to{opacity:1}}.progress-bar{display:flex;gap:8px;margin:10px 0}.tooth-icon{width:20px;height:24px;background:#555;border-radius:4px 4px 6px 6px;transition:all .3s}.tooth-icon.done{background:#fff;box-shadow:0 0 8px #fff,0 0 16px rgba(255,255,255,.5)}</style></head><body><div id="app"></div><script>
const T={p1:'Mati estaba almorzando con su pap├Ī. ┬ĪLa comida estaba deliciosa!',p2:'Pero despu├®s de comer... ┬Īaparecieron unos bichitos traviesos entre los dientes de Mati!',p3:'┬ĪAyuda a Mati! Toca cada bichito para limpiarlo con el cepillo.',p4:'┬ĪMuy bien! Ahora hay que cepillar la lengua. ┬ĪT├│cala 3 veces!',p5:'┬ĪFelicidades! ┬ĪLa boca de Mati est├Ī s├║per limpia!'};
let currentPage=0,bichitosLeft=0,tongueCount=0,audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(f,d,t){initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(.3,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+d);o.start();o.stop(audioCtx.currentTime+d)}
function playPop(){playTone(600,.15,'sine');setTimeout(()=>playTone(800,.1,'sine'),50)}
function playSuccess(){[523,659,784].forEach((f,i)=>setTimeout(()=>playTone(f,.2,'sine'),i*150))}
function playCelebration(){const n=[523,587,659,698,784,880,988,1047];n.forEach((f,i)=>setTimeout(()=>playTone(f,.25,'triangle'),i*180))}
function vibrate(){try{navigator.vibrate&&navigator.vibrate(50)}catch(e){}}
function typeWriter(el,text,cb){el.textContent='';let i=0;const iv=setInterval(()=>{if(i<text.length){el.textContent+=text[i];i++}else{clearInterval(iv);cb&&cb()}},50)}
function createApp(){const app=document.getElementById('app');app.innerHTML=buildPages();showPage(0)}
function buildPages(){return `<div class="page p1" id="pg0"><div class="st" id="t0"></div><svg viewBox="0 0 300 250" width="280" style="max-width:90%">${svgPage1()}</svg><button class="nb r" onclick="nav(1)">Siguiente ŌåÆ</button></div><div class="page pm" id="pg1"><div class="st" id="t1"></div><svg viewBox="0 0 320 360" width="300" style="max-width:95%" id="mouth1">${svgMouth(false)}</svg><button class="nb l" onclick="nav(-1)">ŌåÉ Atr├Īs</button><button class="nb r" onclick="nav(1)">Siguiente ŌåÆ</button></div><div class="page pm" id="pg2"><div class="st" id="t2"></div><svg viewBox="0 0 320 360" width="300" style="max-width:95%" id="mouth2">${svgMouth(true)}</svg><div id="brush-container"></div><button class="nb l" onclick="nav(-1)">ŌåÉ Atr├Īs</button><button class="nb r h" id="btn2">Siguiente ŌåÆ</button></div><div class="page pm" id="pg3"><div class="st" id="t3"></div><svg viewBox="0 0 320 300" width="280" style="max-width:90%" id="tongue-svg">${svgTongue()}</svg><div class="progress-bar" id="tprog">${'<div class="tooth-icon"></div>'.repeat(3)}</div><button class="nb l" onclick="nav(-1)">ŌåÉ Atr├Īs</button><button class="nb r h" id="btn3">Siguiente ŌåÆ</button></div><div class="page p5" id="pg4"><div class="st" id="t4"></div><svg viewBox="0 0 300 250" width="280" style="max-width:90%">${svgPage5()}</svg><div id="confetti-box"></div></div>`}
function svgPage1(){return `<rect x="0" y="0" width="300" height="250" fill="none"/><g id="clouds"><ellipse cx="-30" cy="40" rx="40" ry="18" fill="rgba(255,255,255,.8)" style="animation:cloud-move 20s linear infinite"/><ellipse cx="-80" cy="65" rx="35" ry="15" fill="rgba(255,255,255,.6)" style="animation:cloud-move 28s linear infinite 5s"/></g><rect x="80" y="160" width="140" height="60" rx="5" fill="#8B4513"/><rect x="90" y="155" width="30" height="15" rx="3" fill="#ddd"/><rect x="180" y="155" width="30" height="15" rx="3" fill="#ddd"/>${svgChar(110,100,false,'#8B5E3C',false)}${svgChar(190,90,true,'#5C3A1E',true)}`}
function svgChar(x,y,tall,hair,dad){const h=tall?-10:0;return `<circle cx="${x}" cy="${y+h}" r="22" fill="#FDBF60"/><ellipse cx="${x}" cy="${y+55+h}" rx="18" ry="25" fill="${dad?'#3a6ea5':'#e74c3c'}"/><line x1="${x-20}" y1="${y+40+h}" x2="${x-28}" y2="${y+55+h}" stroke="#FDBF60" stroke-width="4" stroke-linecap="round"/><line x1="${x+20}" y1="${y+40+h}" x2="${x+28}" y2="${y+55+h}" stroke="#FDBF60" stroke-width="4" stroke-linecap="round"/><circle cx="${x-28}" cy="${y+57+h}" r="4" fill="#FDBF60"/><circle cx="${x+28}" cy="${y+57+h}" r="4" fill="#FDBF60"/><circle cx="${x-7}" cy="${y-3+h}" r="2.5" fill="#333"/><circle cx="${x+7}" cy="${y-3+h}" r="2.5" fill="#333"/><line x1="${x-10}" y1="${y-10+h}" x2="${x-4}" y2="${y-8+h}" stroke="#333" stroke-width="1.5"/><line x1="${x+4}" y1="${y-8+h}" x2="${x+10}" y2="${y-10+h}" stroke="#333" stroke-width="1.5"/><path d="M${x-8} ${y+5+h} Q${x} ${y+14+h} ${x+8} ${y+5+h}" stroke="#333" stroke-width="2" fill="none"/>${dad?`<circle cx="${x-7}" cy="${y-2+h}" r="6" fill="none" stroke="#333" stroke-width="1"/><circle cx="${x+7}" cy="${y-2+h}" r="6" fill="none" stroke="#333" stroke-width="1"/><g fill="#8B7355">${[...Array(5)].map((_,i)=>`<circle cx="${x-4+i*2}" cy="${y+12+h}" r=".8"/>`).join('')}</g>`:''}<path d="M${x-15} ${y-18+h} Q${x} ${y-32+h} ${x+15} ${y-18+h}" fill="${hair}" opacity=".9"/><path d="M${x-17} ${y-14+h} Q${x-20} ${y-28+h} ${x-5} ${y-25+h}" fill="${hair}" opacity=".7"/><path d="M${x+5} ${y-25+h} Q${x+20} ${y-28+h} ${x+17} ${y-14+h}" fill="${hair}" opacity=".7"/>`}
function svgMouth(interactive){const teeth_top=[];const teeth_bot=[];const numTeeth=10;for(let i=0;i<numTeeth;i++){const x=32+i*(256/numTeeth);const w=256/numTeeth-3;teeth_top.push(`<rect x="${x}" y="28" width="${w}" height="38" rx="6" fill="url(#tg)" stroke="#eee" stroke-width=".5"/>`);teeth_bot.push(`<rect x="${x}" y="268" width="${w}" height="38" rx="6" fill="url(#tg)" stroke="#eee" stroke-width=".5"/>`)}
let bichitos='';if(interactive){const positions=[[55,55],[105,55],[160,55],[215,55],[260,55],[55,278],[105,278],[160,278],[215,278],[260,278]];bichitosLeft=positions.length;positions.forEach((p,i)=>{const shade=['#4CAF50','#66BB6A','#388E3C','#43A047','#2E7D32'][i%5];const sz=8+Math.random()*4;bichitos+=`<g class="bichito" id="b${i}" data-idx="${i}" style="cursor:pointer;animation:bounce ${.8+Math.random()*.4}s ease-in-out infinite ${Math.random()*.5}s"><ellipse cx="${p[0]}" cy="${p[1]}" rx="${sz}" ry="${sz-2}" fill="${shade}"/><circle cx="${p[0]-3}" cy="${p[1]-2}" r="1.5" fill="#fff"/><circle cx="${p[0]+3}" cy="${p[1]-2}" r="1.5" fill="#fff"/><circle cx="${p[0]-3}" cy="${p[1]-2}" r=".8" fill="#111"/><circle cx="${p[0]+3}" cy="${p[1]-2}" r=".8" fill="#111"/><line x1="${p[0]-3}" y1="${p[1]-sz+1}" x2="${p[0]-5}" y2="${p[1]-sz-5}" stroke="${shade}" stroke-width="1.2" stroke-linecap="round"/><line x1="${p[0]+3}" y1="${p[1]-sz+1}" x2="${p[0]+5}" y2="${p[1]-sz-5}" stroke="${shade}" stroke-width="1.2" stroke-linecap="round"/><circle cx="${p[0]-5}" cy="${p[1]-sz-6}" r="1.5" fill="${shade}"/><circle cx="${p[0]+5}" cy="${p[1]-sz-6}" r="1.5" fill="${shade}"/><path d="M${p[0]-sz} ${p[1]+3} q-3 3 -1 5" stroke="${shade}" stroke-width="1" fill="none"/><path d="M${p[0]-sz+2} ${p[1]+5} q-3 2 -1 4" stroke="${shade}" stroke-width="1" fill="none"/><path d="M${p[0]-sz+4} ${p[1]+6} q-2 3 0 5" stroke="${shade}" stroke-width="1" fill="none"/><path d="M${p[0]+sz} ${p[1]+3} q3 3 1 5" stroke="${shade}" stroke-width="1" fill="none"/><path d="M${p[0]+sz-2} ${p[1]+5} q3 2 1 4" stroke="${shade}" stroke-width="1" fill="none"/><path d="M${p[0]+sz-4} ${p[1]+6} q2 3 0 5" stroke="${shade}" stroke-width="1" fill="none"/></g>`})}
return `<defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#e8e8e8"/></linearGradient><linearGradient id="gg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d32f2f"/><stop offset="100%" stop-color="#8b0000"/></linearGradient></defs><rect x="0" y="0" width="320" height="360" rx="20" fill="#0af" opacity=".3"/><ellipse cx="160" cy="180" rx="140" ry="160" fill="#7fdbff" opacity=".4"/><path d="M20 60 Q160 0 300 60 L300 20 Q160 -10 20 20 Z" fill="url(#gg)"/><path d="M20 300 Q160 360 300 300 L300 340 Q160 370 20 340 Z" fill="url(#gg)"/>${teeth_top.join('')}${teeth_bot.join('')}<ellipse cx="160" cy="320" rx="70" ry="25" fill="#e57373" opacity=".8"/>${bichitos}<rect id="shimmer-bar" x="-60" y="28" width="60" height="280" fill="url(#shimmerGrad)" opacity="0" style="pointer-events:none"/><defs><linearGradient id="shimmerGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="rgba(255,255,255,0)"/><stop offset="50%" stop-color="rgba(255,255,255,.6)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></linearGradient></defs>`}
function svgTongue(){return `<defs><radialGradient id="tongue-grad"><stop offset="0%" stop-color="#f48fb1"/><stop offset="100%" stop-color="#e91e63"/></radialGradient></defs><rect width="320" height="300" fill="none"/><ellipse cx="160" cy="160" rx="120" ry="130" fill="url(#tongue-grad)" id="tongue-el" style="cursor:pointer"/><ellipse cx="130" cy="130" rx="8" ry="3" fill="rgba(255,255,255,.2)" transform="rotate(-15 130 130)"/><ellipse cx="190" cy="140" rx="6" ry="2.5" fill="rgba(255,255,255,.15)" transform="rotate(10 190 140)"/><path d="M100 160 Q160 200 220 160" stroke="rgba(0,0,0,.15)" stroke-width="2" fill="none"/>`}
function svgPage5(){return `<rect width="300" height="250" fill="none"/>${svgCharCelebrate(100,100,false,'#8B5E3C',false)}${svgCharCelebrate(200,90,true,'#5C3A1E',true)}<text x="150" y="30" text-anchor="middle" font-size="18" fill="#fff" font-weight="bold">­¤Äē ┬ĪS├║per limpio! ­¤Äē</text>`}
function svgCharCelebrate(x,y,tall,hair,dad){const h=tall?-10:0;return `<circle cx="${x}" cy="${y+h}" r="22" fill="#FDBF60"/><ellipse cx="${x}" cy="${y+55+h}" rx="18" ry="25" fill="${dad?'#3a6ea5':'#e74c3c'}"/><line x1="${x-20}" y1="${y+35+h}" x2="${x-30}" y2="${y+5+h}" stroke="#FDBF60" stroke-width="4" stroke-linecap="round"/><line x1="${x+20}" y1="${y+35+h}" x2="${x+30}" y2="${y+5+h}" stroke="#FDBF60" stroke-width="4" stroke-linecap="round"/><circle cx="${x-30}" cy="${y+3+h}" r="4" fill="#FDBF60"/><circle cx="${x+30}" cy="${y+3+h}" r="4" fill="#FDBF60"/><circle cx="${x-7}" cy="${y-3+h}" r="2.5" fill="#333"/><circle cx="${x+7}" cy="${y-3+h}" r="2.5" fill="#333"/><path d="M${x-10} ${y+4+h} Q${x} ${y+16+h} ${x+10} ${y+4+h}" stroke="#333" stroke-width="2" fill="#fff"/>${dad?`<circle cx="${x-7}" cy="${y-2+h}" r="6" fill="none" stroke="#333" stroke-width="1"/><circle cx="${x+7}" cy="${y-2+h}" r="6" fill="none" stroke="#333" stroke-width="1"/>`:''}<path d="M${x-15} ${y-18+h} Q${x} ${y-32+h} ${x+15} ${y-18+h}" fill="${hair}" opacity=".9"/>`}
function showPage(idx){const pages=document.querySelectorAll('.page');const dir=idx>currentPage?1:-1;pages.forEach((p,i)=>{if(i===currentPage&&i!==idx){p.classList.remove('active');p.classList.add(dir===1?'sol':'sor');setTimeout(()=>{p.classList.remove('sol','sor');p.style.opacity='0';p.style.pointerEvents='none'},500)}if(i===idx){setTimeout(()=>{p.classList.add('active',dir===1?'sir':'sil');p.style.opacity='1';p.style.pointerEvents='all';setTimeout(()=>p.classList.remove('sir','sil'),500)},50)}});currentPage=idx;setTimeout(()=>{const tid=`t${idx}`;const tel=document.getElementById(tid);if(tel){const texts=[T.p1,T.p2,T.p3,T.p4,T.p5];typeWriter(tel,texts[idx])}if(idx===2)setupBichitos();if(idx===3)setupTongue();if(idx===4){playCelebration();launchConfetti()}},100)}
function nav(dir){const next=currentPage+dir;if(next>=0&&next<=4)showPage(next)}
function setupBichitos(){const svg=document.getElementById('mouth2');if(!svg)return;svg.querySelectorAll('.bichito').forEach(b=>{b.onclick=function(e){e.stopPropagation();const idx=this.dataset.idx;tapBichito(this,idx)}})}
function tapBichito(el,idx){vibrate();playPop();const rect=el.getBoundingClientRect();createSplat(rect.x+rect.width/2,rect.y+rect.height/2);showBrush(el);el.style.transition='transform .2s, opacity .2s';el.style.transform='scale(0.1)';el.style.opacity='0';setTimeout(()=>{el.remove();bichitosLeft--;if(bichitosLeft<=0){document.getElementById('btn2').classList.remove('h');document.getElementById('btn2').onclick=()=>nav(1);playSuccess();triggerShimmer()}},300)}
function createSplat(x,y){for(let i=0;i<8;i++){const p=document.createElement('div');p.style.cssText=`position:fixed;left:${x}px;top:${y}px;width:6px;height:6px;border-radius:50%;background:hsl(${100+Math.random()*40},70%,50%);pointer-events:none;z-index:9999;transition:all .5s ease-out`;document.body.appendChild(p);const angle=Math.random()*Math.PI*2;const dist=30+Math.random()*30;setTimeout(()=>{p.style.left=x+Math.cos(angle)*dist+'px';p.style.top=y+Math.sin(angle)*dist+'px';p.style.opacity='0';p.style.transform='scale(0)'},10);setTimeout(()=>p.remove(),600)}}
function showBrush(el){const svg=document.getElementById('mouth2');const box=el.getBBox();const bx=box.x,by=box.y;const brush=document.createElementNS('http://www.w3.org/2000/svg','g');brush.innerHTML=`<rect x="${bx-5}" y="${by-20}" width="12" height="40" rx="3" fill="#4FC3F7"/><rect x="${bx-8}" y="${by-22}" width="18" height="8" rx="2" fill="#fff"/>`;svg.appendChild(brush);let moves=0;const iv=setInterval(()=>{const off=moves%2===0?3:-3;brush.setAttribute('transform',`translate(${off},0)`);createBubble(svg,bx+Math.random()*10,by-25);moves++;if(moves>5){clearInterval(iv);brush.remove()}},120)}
function createBubble(svg,x,y){const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',2+Math.random()*3);c.setAttribute('fill','rgba(255,255,255,.6)');c.style.transition='all .8s ease-out';svg.appendChild(c);setTimeout(()=>{c.setAttribute('cy',y-20-Math.random()*15);c.setAttribute('cx',x+(Math.random()-.5)*10);c.style.opacity='0'},50);setTimeout(()=>c.remove(),900)}
function triggerShimmer(){const bar=document.querySelector('#mouth2 #shimmer-bar');if(bar){bar.style.opacity='1';bar.style.transition='transform 1s ease';bar.style.transform='translateX(380px)';setTimeout(()=>{bar.style.opacity='0';bar.style.transform='translateX(0)'},1100)}}
function setupTongue(){tongueCount=0;const tel=document.getElementById('tongue-el');if(!tel)return;tel.onclick=function(){tongueCount++;vibrate();playPop();this.style.transition='transform .1s';this.style.transform='scale(.95)';setTimeout(()=>this.style.transform='scale(1)',100);const icons=document.querySelectorAll('.tooth-icon');if(icons[tongueCount-1])icons[tongueCount-1].classList.add('done');if(tongueCount>=3){document.getElementById('btn3').classList.remove('h');document.getElementById('btn3').onclick=()=>nav(1);playSuccess()}}}
function launchConfetti(){const box=document.getElementById('confetti-box');if(!box)return;box.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:50';const colors=['#ff6b9d','#c44dff','#ffd93d','#6bcf7f','#4dc9f6','#f67019','#ff9ff3'];for(let i=0;i<40;i++){const d=document.createElement('div');const c=colors[Math.floor(Math.random()*colors.length)];const sz=6+Math.random()*8;const left=Math.random()*100;const delay=Math.random()*2;const dur=2+Math.random()*2;d.style.cssText=`position:absolute;top:-20px;left:${left}%;width:${sz}px;height:${sz*(Math.random()>.5?1:2.5)}px;background:${c};border-radius:${Math.random()>.5?'50%':'2px'};animation:confetti-fall ${dur}s ease-in ${delay}s forwards`;box.appendChild(d)}}
window.onload=createApp;document.addEventListener('pointerdown',initAudio,{once:true});
</script></body></html>
