<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cuento de Mati - Cepillarse los Dientes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
.book{position:relative;width:100%;height:100%;overflow:hidden}
.page{position:absolute;top:0;left:0;width:100%;height:100%;background-size:contain;background-position:center;background-repeat:no-repeat;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;transition:transform .5s cubic-bezier(.4,0,.2,1);will-change:transform}
.page.left{transform:translateX(-100%)}.page.center{transform:translateX(0)}.page.right{transform:translateX(100%)}
#page1{background-color:#87ceeb}#page2{background-color:#1a0a0a}#page3{background-color:#1a0a0a}#page4{background-color:#2d1a1a}#page5{background-color:#4a2c6e}
.story-text{position:absolute;bottom:70px;left:4%;right:4%;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:16px;padding:14px 18px;color:#fff;font-size:clamp(14px,4vw,20px);line-height:1.5;text-align:center;text-shadow:0 1px 3px rgba(0,0,0,.7);z-index:10}
.story-text.top{bottom:auto;top:10px}
.nav{position:absolute;bottom:12px;left:0;right:0;display:flex;justify-content:center;gap:14px;z-index:20;padding:0 14px}
.nav-btn{padding:11px 24px;border:none;border-radius:30px;background:rgba(255,255,255,.25);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:#fff;font-size:clamp(13px,3.5vw,17px);font-weight:600;cursor:pointer;transition:background .2s,transform .1s;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.nav-btn:active{transform:scale(.93);background:rgba(255,255,255,.4)}.nav-btn.hidden{display:none}
.interactive-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none}.interactive-overlay>*{pointer-events:auto}
.bichito{position:absolute;width:50px;height:44px;cursor:pointer;z-index:6;transition:top 1.5s ease-in-out,left 1.5s ease-in-out}
.bichito-body{width:100%;height:100%;border-radius:50% 50% 45% 45%;background:radial-gradient(ellipse at 40% 35%,#8fef6f,#3ea832);position:relative;box-shadow:0 3px 10px rgba(0,255,0,.4),0 2px 6px rgba(0,0,0,.3);animation:wobble .8s ease-in-out infinite}
@keyframes wobble{0%,100%{transform:rotate(-3deg) scale(1)}50%{transform:rotate(3deg) scale(1.05)}}
.bichito-eye{position:absolute;top:22%;width:14px;height:15px;border-radius:50%;background:#fff;box-shadow:inset 0 1px 2px rgba(0,0,0,.1)}.bichito-eye.l{left:18%}.bichito-eye.r{right:18%}
.bichito-pupil{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;background:#111}
.bichito-mouth{position:absolute;bottom:16%;left:50%;transform:translateX(-50%);width:16px;height:8px;border-bottom:2.5px solid #2d6b1f;border-radius:0 0 50% 50%}
.bichito-antenna{position:absolute;top:-10px;width:2.5px;height:12px;background:#3ea832}.bichito-antenna.l{left:28%;transform:rotate(-15deg)}.bichito-antenna.r{right:28%;transform:rotate(15deg)}
.bichito-antenna::after{content:'';position:absolute;top:-5px;left:-3px;width:8px;height:8px;border-radius:50%;background:#5dd44a}
.bichito.foaming{opacity:.6;transform:scale(.7);transition:all .5s ease}.bichito.dead{opacity:0;transform:scale(0) translateY(-20px);pointer-events:none;transition:all .5s ease}.toothbrush{position:fixed;pointer-events:none;z-index:99;display:flex;flex-direction:column;align-items:center}
.brush-handle{width:14px;height:55px;background:linear-gradient(to right,#4db8e8,#2196F3,#4db8e8);border-radius:6px}
.brush-head{width:24px;height:32px;background:#fff;border-radius:4px 4px 8px 8px;margin-top:-2px;box-shadow:0 1px 3px rgba(0,0,0,.2);position:relative}
.brush-bristle{position:absolute;width:3px;height:10px;background:#a8d8f0;border-radius:0 0 2px 2px}
.brush-bristle:nth-child(1){left:3px;top:18px}.brush-bristle:nth-child(2){left:8px;top:18px}.brush-bristle:nth-child(3){left:13px;top:18px}.brush-bristle:nth-child(4){left:18px;top:18px}
.toothbrush.brushing{animation:brushMove .8s ease-in-out}
@keyframes brushMove{0%{transform:translateX(-15px) rotate(-5deg)}25%{transform:translateX(15px) rotate(5deg)}50%{transform:translateX(-10px) rotate(-3deg)}75%{transform:translateX(10px) rotate(3deg)}100%{transform:translateX(0) rotate(0)}}
.foam-cloud{position:fixed;pointer-events:none;z-index:97;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.9),rgba(200,230,255,.6));animation:foamGrow .6s ease-out forwards}
@keyframes foamGrow{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(1.5) translateY(-15px)}}
.foam-bubble{position:fixed;border-radius:50%;background:rgba(255,255,255,.7);pointer-events:none;animation:bubbleFloat 1.8s ease-out forwards;z-index:98;border:1px solid rgba(255,255,255,.3)}
@keyframes bubbleFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) translateX(var(--drift)) scale(.2)}}
.splat{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;animation:splatAnim .6s ease-out forwards;z-index:100}
@keyframes splatAnim{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}
.shimmer-overlay{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.4) 50%,transparent 65%);z-index:12;pointer-events:none;animation:shimmerMove 1.2s ease-in-out forwards}
@keyframes shimmerMove{0%{left:-100%}100%{left:100%}}
.tongue-zone{position:absolute;top:20%;left:15%;width:70%;height:55%;border-radius:40%;cursor:pointer;z-index:6;background:rgba(255,255,255,.08);border:3px dashed rgba(255,255,255,.4);transition:all .15s;display:flex;align-items:center;justify-content:center}
.tongue-zone::after{content:'\1F445 Toca aqu\00ED';color:rgba(255,255,255,.6);font-size:clamp(14px,4vw,18px);font-weight:500}
.tongue-zone:active{background:rgba(255,255,255,.2);transform:scale(.97)}.tongue-zone.done::after{content:'\2728'}
.progress-dots{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:15}
.progress-dot{width:28px;height:32px;background:rgba(255,255,255,.2);clip-path:polygon(50% 0%,63% 8%,75% 18%,80% 35%,78% 55%,70% 75%,60% 90%,50% 100%,40% 90%,30% 75%,22% 55%,20% 35%,25% 18%,37% 8%);transition:all .4s}
.progress-dot.filled{background:#fff;box-shadow:0 0 12px rgba(255,255,255,.9);transform:scale(1.1)}
.confetti{position:absolute;pointer-events:none;animation:confettiFall var(--dur) linear forwards;z-index:15;opacity:.9}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.sparkle{position:absolute;width:8px;height:8px;background:#fff;border-radius:50%;pointer-events:none;animation:sparkleAnim 2s ease-in-out infinite;z-index:14}
@keyframes sparkleAnim{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1.3)}}
.success-msg{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:20px;padding:20px 36px;color:#fff;font-size:clamp(22px,6vw,34px);font-weight:700;z-index:18;animation:popIn .4s ease-out;pointer-events:none}
@keyframes popIn{0%{transform:translate(-50%,-50%) scale(0)}60%{transform:translate(-50%,-50%) scale(1.1)}100%{transform:translate(-50%,-50%) scale(1)}}
#cover{position:absolute;top:0;left:0;width:100%;height:100%;background-color:#a8e6cf;background-image:url('images/cover.png');background-size:contain;background-position:center;background-repeat:no-repeat;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:15%;transition:opacity .6s ease,visibility .6s ease;opacity:1;visibility:visible}
#cover.hidden{opacity:0;visibility:hidden;pointer-events:none}
.cover-title{position:absolute;top:15%;left:0;right:0;text-align:center;color:#fff;font-size:clamp(28px,8vw,42px);font-weight:800;text-shadow:0 3px 10px rgba(0,0,0,.4);z-index:10}
.cover-subtitle{position:absolute;top:25%;left:0;right:0;text-align:center;color:rgba(255,255,255,.9);font-size:clamp(16px,4vw,22px);font-weight:500;text-shadow:0 2px 5px rgba(0,0,0,.3);z-index:10}
.start-btn{padding:18px 50px;border:none;border-radius:40px;background:#fff;color:#2e7d32;font-size:clamp(20px,5vw,28px);font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(46,125,50,.4);animation:glow 2s ease-in-out infinite;min-height:60px}
@keyframes glow{0%,100%{box-shadow:0 4px 20px rgba(46,125,50,.3)}50%{box-shadow:0 4px 30px rgba(46,125,50,.6),0 0 40px rgba(46,125,50,.2)}}
.start-btn:active{transform:scale(.95)}
</style>
</head>
<body><div id="cover">
<div class="cover-title">El Cuento de Mati</div>
<div class="cover-subtitle">&#161;Vamos a cepillar los dientes!</div>
<button class="start-btn" id="startBtn">&#9654; Comenzar</button>
</div>
<div class="book" id="book">
<div class="page center" id="page1" style="background-image:url('images/page1.png')">
<p class="story-text" id="text1"></p>
<div class="nav"><button class="nav-btn" onclick="goTo(2)">Siguiente &#8594;</button></div>
</div>
<div class="page right" id="page2" style="background-image:url('images/page2.png')">
<p class="story-text" id="text2"></p>
<div class="nav">
<button class="nav-btn" onclick="goTo(1)">&#8592; Atr&#225;s</button>
<button class="nav-btn" onclick="goTo(3)">Siguiente &#8594;</button>
</div>
</div>
<div class="page right" id="page3" style="background-image:url('images/page3.png')">
<p class="story-text top" id="text3"></p>
<div class="interactive-overlay" id="bichitosArea"></div>
<div class="nav">
<button class="nav-btn" onclick="goTo(2)">&#8592; Atr&#225;s</button>
<button class="nav-btn hidden" id="nav3next" onclick="goTo(4)">Siguiente &#8594;</button>
</div>
</div>
<div class="page right" id="page4" style="background-image:url('images/page4.png')">
<p class="story-text top" id="text4"></p>
<div class="progress-dots" id="tongueDots">
<div class="progress-dot" id="dot0"></div>
<div class="progress-dot" id="dot1"></div>
<div class="progress-dot" id="dot2"></div>
</div>
<div class="interactive-overlay">
<div class="tongue-zone" id="tongueZone"></div>
</div>
<div class="nav">
<button class="nav-btn" onclick="goTo(3)">&#8592; Atr&#225;s</button>
<button class="nav-btn hidden" id="nav4next" onclick="goTo(5)">Siguiente &#8594;</button>
</div>
</div>
<div class="page right" id="page5" style="background-image:url('images/page5.png')">
<p class="story-text" id="text5"></p>
<div class="nav">
<button class="nav-btn" onclick="goTo(4)">&#8592; Atr&#225;s</button>
<button class="nav-btn" onclick="replayGame()">&#128260; Jugar de nuevo</button>
</div>
</div>
</div>
<script>let currentPage=1,bichitosLeft=12,tongueTaps=0,audioCtx=null,page5Played=false;
let bichMoveIntervals=[];
const bichColors=[
{body:'radial-gradient(ellipse at 40% 35%,#ce93d8,#7b1fa2)',accent:'#7b1fa2',splat:'#ce93d8'},
{body:'radial-gradient(ellipse at 40% 35%,#81d4fa,#0277bd)',accent:'#0277bd',splat:'#81d4fa'},
{body:'radial-gradient(ellipse at 40% 35%,#ffcc80,#e65100)',accent:'#e65100',splat:'#ffcc80'},
{body:'radial-gradient(ellipse at 40% 35%,#f48fb1,#c2185b)',accent:'#c2185b',splat:'#f48fb1'},
{body:'radial-gradient(ellipse at 40% 35%,#8fef6f,#3ea832)',accent:'#3ea832',splat:'#8fef6f'},
{body:'radial-gradient(ellipse at 40% 35%,#fff59d,#f9a825)',accent:'#f9a825',splat:'#fff59d'},
{body:'radial-gradient(ellipse at 40% 35%,#80deea,#00838f)',accent:'#00838f',splat:'#80deea'},
{body:'radial-gradient(ellipse at 40% 35%,#ef9a9a,#c62828)',accent:'#c62828',splat:'#ef9a9a'}
];
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx}
function playPop(){try{const c=getAudioCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(600,c.currentTime);o.frequency.exponentialRampToValueAtTime(200,c.currentTime+.15);g.gain.setValueAtTime(.3,c.currentTime);g.gain.exponentialRampToValueAtTime(.01,c.currentTime+.15);o.start(c.currentTime);o.stop(c.currentTime+.15)}catch(e){}}
function playSuccess(){try{const c=getAudioCtx();[523,659,784].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='triangle';o.frequency.setValueAtTime(f,c.currentTime+i*.12);g.gain.setValueAtTime(.25,c.currentTime+i*.12);g.gain.exponentialRampToValueAtTime(.01,c.currentTime+i*.12+.3);o.start(c.currentTime+i*.12);o.stop(c.currentTime+i*.12+.3)})}catch(e){}}
function playCelebration(){try{const c=getAudioCtx();[523,587,659,698,784,880,988,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.setValueAtTime(f,c.currentTime+i*.15);g.gain.setValueAtTime(.12,c.currentTime+i*.15);g.gain.exponentialRampToValueAtTime(.01,c.currentTime+i*.15+.25);o.start(c.currentTime+i*.15);o.stop(c.currentTime+i*.15+.25)})}catch(e){}}
function vibrate(ms){try{navigator.vibrate&&navigator.vibrate(ms||30)}catch(e){}}
function typewriter(el,text,speed){el.textContent='';let i=0;(function t(){if(i<text.length){el.textContent+=text[i];i++;setTimeout(t,speed||40)}})()}
function showBrush(x,y,duration){const brush=document.createElement('div');brush.className='toothbrush brushing';brush.innerHTML='<div class="brush-head"><div class="brush-bristle"></div><div class="brush-bristle"></div><div class="brush-bristle"></div><div class="brush-bristle"></div></div><div class="brush-handle"></div>';brush.style.left=(x-12)+'px';brush.style.top=(y-70)+'px';document.body.appendChild(brush);setTimeout(()=>brush.remove(),duration||850);return brush}
function spawnFoam(cx,cy,count){for(let i=0;i<(count||3);i++){setTimeout(()=>{const foam=document.createElement('div');foam.className='foam-cloud';foam.style.left=(cx-15+Math.random()*30)+'px';foam.style.top=(cy-15+Math.random()*30)+'px';foam.style.width=foam.style.height=(20+Math.random()*20)+'px';document.body.appendChild(foam);setTimeout(()=>foam.remove(),700)},i*150)}for(let i=0;i<8;i++){setTimeout(()=>{const bub=document.createElement('div');bub.className='foam-bubble';bub.style.left=(cx-20+Math.random()*40)+'px';bub.style.top=(cy-10+Math.random()*20)+'px';bub.style.width=bub.style.height=(4+Math.random()*10)+'px';bub.style.setProperty('--drift',(Math.random()*30-15)+'px');document.body.appendChild(bub);setTimeout(()=>bub.remove(),1900)},i*100)}}function goTo(page){if(page<1||page>5)return;document.querySelectorAll('.page').forEach((p,idx)=>{const n=idx+1;p.className='page '+(n===page?'center':n<page?'left':'right')});currentPage=page;onPageEnter(page)}
const pageTexts=['Mati y pap\u00e1 estaban comiendo un almuerzo delicioso. \u00a1Qu\u00e9 rico!','\u00a1Oh no! Despu\u00e9s de comer, unos bichitos aparecieron entre los dientes. \u00a1Hay que sacarlos!','\u00a1Toca los bichitos de colores para limpiarlos!','\u00a1Ahora la lengua! Toca 3 veces para cepillarla.','\u00a1Mati tiene los dientes limpios! \u00a1Pap\u00e1 est\u00e1 muy orgulloso! \ud83c\udf89'];
let entered=new Set([1]);
function onPageEnter(p){if(!entered.has(p)){entered.add(p);const el=document.getElementById('text'+p);if(el)typewriter(el,pageTexts[p-1],35)}if(p===5&&!page5Played){page5Played=true;setTimeout(()=>{spawnConfetti();playCelebration()},400)}}
const bichPos=[{top:'20%',left:'5%'},{top:'20%',left:'25%'},{top:'20%',left:'45%'},{top:'20%',left:'65%'},{top:'40%',left:'10%'},{top:'40%',left:'30%'},{top:'40%',left:'50%'},{top:'40%',left:'70%'},{top:'60%',left:'8%'},{top:'60%',left:'28%'},{top:'60%',left:'48%'},{top:'60%',left:'68%'}];
function startBichMovement(){bichMoveIntervals.forEach(clearInterval);bichMoveIntervals=[];document.querySelectorAll('#bichitosArea .bichito').forEach((b,i)=>{const delay=Math.random()*1000;setTimeout(()=>{const interval=setInterval(()=>{if(b.classList.contains('dead')||b.classList.contains('foaming')){clearInterval(interval);return}const newTop=(15+Math.random()*50)+'%';const newLeft=(5+Math.random()*75)+'%';b.style.top=newTop;b.style.left=newLeft},1500+Math.random()*1500);bichMoveIntervals.push(interval)},delay)})}
function createBichitos(){const area=document.getElementById('bichitosArea');area.innerHTML='';bichitosLeft=12;document.getElementById('nav3next').classList.add('hidden');bichPos.forEach((pos,i)=>{const color=bichColors[i%8];const b=document.createElement('div');b.className='bichito';b.style.top=pos.top;b.style.left=pos.left;b.dataset.color=color.splat;b.dataset.accent=color.accent;b.innerHTML='<div class="bichito-body"><div class="bichito-antenna l"></div><div class="bichito-antenna r"></div><div class="bichito-eye l"><div class="bichito-pupil"></div></div><div class="bichito-eye r"><div class="bichito-pupil"></div></div><div class="bichito-mouth"></div></div>';const body=b.querySelector('.bichito-body');body.style.background=color.body;const antennae=b.querySelectorAll('.bichito-antenna');antennae.forEach(a=>{a.style.background=color.accent});const style=document.createElement('style');style.textContent='#bichitosArea .bichito:nth-child('+(i+1)+') .bichito-antenna::after{background:'+color.splat+'}';document.head.appendChild(style);b.addEventListener('pointerdown',e=>tapBichito(e,b));area.appendChild(b)});startBichMovement()}function tapBichito(e,el){if(el.classList.contains('dead')||el.classList.contains('foaming'))return;e.preventDefault();e.stopPropagation();vibrate(50);playPop();const rect=el.getBoundingClientRect();const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;showBrush(cx,cy,850);el.classList.add('foaming');spawnFoam(cx,cy,3);const splatColor=el.dataset.color||'#8fef6f';const accentColor=el.dataset.accent||'#3ea832';setTimeout(()=>{for(let i=0;i<10;i++){const p=document.createElement('div');p.className='splat';const angle=(Math.PI*2/10)*i;const dist=20+Math.random()*25;p.style.left=cx+'px';p.style.top=cy+'px';p.style.setProperty('--dx',Math.cos(angle)*dist+'px');p.style.setProperty('--dy',Math.sin(angle)*dist+'px');p.style.background=[splatColor,accentColor,splatColor,accentColor,'#fff'][i%5];document.body.appendChild(p);setTimeout(()=>p.remove(),700)}el.classList.add('dead');bichitosLeft--;if(bichitosLeft<=0){setTimeout(()=>{playSuccess();const sh=document.createElement('div');sh.className='shimmer-overlay';document.getElementById('page3').appendChild(sh);setTimeout(()=>sh.remove(),1400);const msg=document.createElement('div');msg.className='success-msg';msg.textContent='\u00a1Muy bien! \u00a1Dientes limpios!';document.getElementById('page3').appendChild(msg);setTimeout(()=>msg.remove(),2500);document.getElementById('nav3next').classList.remove('hidden')},300)}},850)}
function setupTongue(){tongueTaps=0;document.querySelectorAll('.progress-dot').forEach(d=>d.classList.remove('filled'));document.getElementById('nav4next').classList.add('hidden');const tz=document.getElementById('tongueZone');tz.classList.remove('done');const newTz=tz.cloneNode(true);tz.parentNode.replaceChild(newTz,tz);newTz.addEventListener('pointerdown',tapTongue)}
function tapTongue(e){if(tongueTaps>=3)return;e.preventDefault();vibrate(40);playPop();tongueTaps++;const dot=document.getElementById('dot'+(tongueTaps-1));if(dot)dot.classList.add('filled');const rect=e.target.getBoundingClientRect();const cx=rect.left+rect.width/2;const cy=rect.top+rect.height/2;showBrush(cx,cy,800);spawnFoam(cx,cy,2);if(tongueTaps>=3){document.getElementById('tongueZone').classList.add('done');setTimeout(()=>{playSuccess();document.getElementById('nav4next').classList.remove('hidden');const msg=document.createElement('div');msg.className='success-msg';msg.textContent='\u00a1Muy bien! \u00a1Lengua limpia!';document.getElementById('page4').appendChild(msg);setTimeout(()=>msg.remove(),2500)},500)}}
function spawnConfetti(){const colors=['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#01a3a4','#f368e0','#ff9f43'];const el=document.getElementById('page5');for(let i=0;i<50;i++){const c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'%';c.style.top='-20px';c.style.background=colors[i%colors.length];c.style.setProperty('--dur',(1.5+Math.random()*2)+'s');c.style.animationDelay=(Math.random()*1.5)+'s';c.style.width=(6+Math.random()*8)+'px';c.style.height=(6+Math.random()*8)+'px';c.style.borderRadius=Math.random()>.5?'50%':'2px';el.appendChild(c);setTimeout(()=>c.remove(),5000)}for(let i=0;i<12;i++){const s=document.createElement('div');s.className='sparkle';s.style.left=(10+Math.random()*80)+'%';s.style.top=(10+Math.random()*60)+'%';s.style.animationDelay=(Math.random()*2)+'s';el.appendChild(s);setTimeout(()=>s.remove(),6000)}}
function startGame(){getAudioCtx();document.getElementById('cover').classList.add('hidden')}
function replayGame(){bichMoveIntervals.forEach(clearInterval);bichMoveIntervals=[];bichitosLeft=12;tongueTaps=0;page5Played=false;entered=new Set([1]);document.querySelectorAll('#page5 .confetti, #page5 .sparkle').forEach(el=>el.remove());document.querySelectorAll('.page').forEach((p,idx)=>{const n=idx+1;p.className='page '+(n===1?'center':'right')});for(let i=1;i<=5;i++){const t=document.getElementById('text'+i);if(t)t.textContent=''}createBichitos();setupTongue();document.getElementById('cover').classList.remove('hidden');currentPage=1}
function init(){typewriter(document.getElementById('text1'),pageTexts[0],35);createBichitos();setupTongue();document.getElementById('startBtn').addEventListener('pointerdown',startGame)}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
