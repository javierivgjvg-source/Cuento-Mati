<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cuento de Mati - Cepillarse los Dientes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
.book{position:relative;width:100%;height:100%;overflow:hidden}
.page{position:absolute;top:0;left:0;width:100%;height:100%;background-size:contain;background-position:center;background-repeat:no-repeat;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;transition:transform .5s cubic-bezier(.4,0,.2,1);will-change:transform}
.page.left{transform:translateX(-100%)}
.page.center{transform:translateX(0)}
.page.right{transform:translateX(100%)}
#page1{background-color:#87ceeb}
#page2{background-color:#1a0a0a}
#page3{background-color:#1a0a0a}
#page4{background-color:#2d1a1a}
#page5{background-color:#4a2c6e}

.story-text{position:absolute;bottom:70px;left:4%;right:4%;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:16px;padding:14px 18px;color:#fff;font-size:clamp(14px,4vw,20px);line-height:1.5;text-align:center;text-shadow:0 1px 3px rgba(0,0,0,.7);z-index:10}
.story-text.top{bottom:auto;top:10px}
.nav{position:absolute;bottom:12px;left:0;right:0;display:flex;justify-content:center;gap:14px;z-index:20;padding:0 14px}
.nav-btn{padding:11px 24px;border:none;border-radius:30px;background:rgba(255,255,255,.25);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:#fff;font-size:clamp(13px,3.5vw,17px);font-weight:600;cursor:pointer;transition:background .2s,transform .1s;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.nav-btn:active{transform:scale(.93);background:rgba(255,255,255,.4)}
.nav-btn.hidden{display:none}
.interactive-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none}
.interactive-overlay>*{pointer-events:auto}

/* Bichitos - estilo matching illustration */
.bichito{position:absolute;width:44px;height:38px;cursor:pointer;animation:bounce .9s ease-in-out infinite;z-index:6;transition:opacity .3s,transform .3s}
.bichito-body{width:100%;height:100%;border-radius:50% 50% 45% 45%;background:radial-gradient(ellipse at 40% 35%,#8fef6f,#3ea832);position:relative;box-shadow:0 3px 8px rgba(0,0,0,.5)}
.bichito-eye{position:absolute;top:25%;width:12px;height:13px;border-radius:50%;background:#fff;box-shadow:inset 0 1px 2px rgba(0,0,0,.1)}
.bichito-eye.left{left:20%}
.bichito-eye.right{right:20%}
.bichito-pupil{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:#111}
.bichito-mouth{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);width:14px;height:7px;border-bottom:2.5px solid #2d6b1f;border-radius:0 0 50% 50%}
.bichito-antenna{position:absolute;top:-8px;width:2px;height:10px;background:#3ea832}
.bichito-antenna.left{left:30%;transform:rotate(-15deg)}
.bichito-antenna.right{right:30%;transform:rotate(15deg)}
.bichito-antenna::after{content:'';position:absolute;top:-4px;left:-2px;width:6px;height:6px;border-radius:50%;background:#5dd44a}
.bichito-leg{position:absolute;bottom:-3px;width:2px;height:7px;background:#3ea832;border-radius:1px}
.bichito-leg.l1{left:15%;transform:rotate(-20deg)}
.bichito-leg.l2{left:35%;transform:rotate(-5deg)}
.bichito-leg.l3{left:55%}
.bichito-leg.r1{right:15%;transform:rotate(20deg)}
.bichito-leg.r2{right:35%;transform:rotate(5deg)}
.bichito-leg.r3{right:55%}
.bichito.dead{opacity:0;transform:scale(0);pointer-events:none}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-5px) rotate(2deg)}}

/* Splat */
.splat{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;animation:splatAnim .5s ease-out forwards;z-index:100}
@keyframes splatAnim{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}

/* Brush */
.brush-anim{position:fixed;width:28px;height:48px;background:linear-gradient(to bottom,#5bc0eb 55%,#fff 55%);border-radius:4px 4px 6px 6px;pointer-events:none;animation:brushSwipe .4s ease-out forwards;z-index:99;opacity:.9}
@keyframes brushSwipe{0%{transform:translateX(-25px) rotate(-8deg);opacity:1}100%{transform:translateX(25px) rotate(8deg);opacity:0}}

/* Shimmer */
.shimmer-overlay{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.4) 50%,transparent 65%);z-index:12;pointer-events:none;animation:shimmerMove 1.2s ease-in-out forwards}
@keyframes shimmerMove{0%{left:-100%}100%{left:100%}}

/* Tongue zone */
.tongue-zone{position:absolute;top:22%;left:18%;width:64%;height:52%;border-radius:45%;cursor:pointer;z-index:6;background:rgba(255,255,255,.03);border:2px dashed rgba(255,255,255,.25);transition:background .15s}
.tongue-zone:active{background:rgba(255,255,255,.12)}

/* Progress dots */
.progress-dots{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:15}
.progress-dot{width:26px;height:30px;background:rgba(255,255,255,.2);clip-path:polygon(50% 0%,63% 8%,75% 18%,80% 35%,78% 55%,70% 75%,60% 90%,50% 100%,40% 90%,30% 75%,22% 55%,20% 35%,25% 18%,37% 8%);transition:background .3s,box-shadow .3s}
.progress-dot.filled{background:#fff;box-shadow:0 0 10px rgba(255,255,255,.8)}

/* Foam */
.foam-bubble{position:fixed;border-radius:50%;background:rgba(255,255,255,.6);pointer-events:none;animation:foamRise 1.5s ease-out forwards;z-index:98}
@keyframes foamRise{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(.3)}}

/* Confetti */
.confetti{position:absolute;pointer-events:none;animation:confettiFall var(--dur) linear forwards;z-index:15;opacity:.9}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* Sparkle */
.sparkle{position:absolute;width:6px;height:6px;background:#fff;border-radius:50%;pointer-events:none;animation:sparkleAnim 2s ease-in-out infinite;z-index:14}
@keyframes sparkleAnim{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1.2)}}

/* Success message */
.success-msg{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:20px;padding:20px 32px;color:#fff;font-size:clamp(20px,6vw,32px);font-weight:700;z-index:18;animation:popIn .4s ease-out;pointer-events:none}
@keyframes popIn{0%{transform:translate(-50%,-50%) scale(0)}60%{transform:translate(-50%,-50%) scale(1.1)}100%{transform:translate(-50%,-50%) scale(1)}}
</style>
</head>
<body>
<div class="book" id="book">

<!-- PAGE 1 -->
<div class="page center" id="page1" style="background-image:url('images/page1.png')">
<p class="story-text" id="text1"></p>
<div class="nav">
<button class="nav-btn" onclick="goTo(2)">Siguiente →</button>
</div>
</div>

<!-- PAGE 2 -->
<div class="page right" id="page2" style="background-image:url('images/page2.png')">
<p class="story-text" id="text2"></p>
<div class="nav">
<button class="nav-btn" onclick="goTo(1)">← Atrás</button>
<button class="nav-btn" onclick="goTo(3)">Siguiente →</button>
</div>
</div>

<!-- PAGE 3 -->
<div class="page right" id="page3" style="background-image:url('images/page3.png')">
<p class="story-text top" id="text3"></p>
<div class="interactive-overlay" id="bichitosArea"></div>
<div class="nav">
<button class="nav-btn" onclick="goTo(2)">← Atrás</button>
<button class="nav-btn hidden" id="nav3next" onclick="goTo(4)">Siguiente →</button>
</div>
</div>

<!-- PAGE 4 -->
<div class="page right" id="page4" style="background-image:url('images/page4.png')">
<p class="story-text top" id="text4"></p>
<div class="progress-dots" id="tongueDots">
<div class="progress-dot" id="dot0"></div>
<div class="progress-dot" id="dot1"></div>
<div class="progress-dot" id="dot2"></div>
</div>
<div class="interactive-overlay">
<div class="tongue-zone" id="tongueZone"></div>
</div>
<div class="nav">
<button class="nav-btn" onclick="goTo(3)">← Atrás</button>
<button class="nav-btn hidden" id="nav4next" onclick="goTo(5)">Siguiente →</button>
</div>
</div>

<!-- PAGE 5 -->
<div class="page right" id="page5" style="background-image:url('images/page5.png')">
<p class="story-text" id="text5"></p>
<div class="nav">
<button class="nav-btn" onclick="goTo(4)">← Atrás</button>
</div>
</div>

</div>

<script>
// STATE
let currentPage = 1;
let bichitosLeft = 8;
let tongueTaps = 0;
let audioCtx = null;
let page5Played = false;

// AUDIO
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playPop(){
  try{
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
  }catch(e){}
}

function playSuccess(){
  try{
    const ctx = getAudioCtx();
    [523,659,784].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i*.12);
      gain.gain.setValueAtTime(0.25, ctx.currentTime + i*.12);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i*.12 + 0.3);
      osc.start(ctx.currentTime + i*.12); osc.stop(ctx.currentTime + i*.12 + 0.3);
    });
  }catch(e){}
}

function playCelebration(){
  try{
    const ctx = getAudioCtx();
    [523,587,659,698,784,880,988,1047].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i*.15);
      gain.gain.setValueAtTime(0.12, ctx.currentTime + i*.15);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i*.15 + 0.25);
      osc.start(ctx.currentTime + i*.15); osc.stop(ctx.currentTime + i*.15 + 0.25);
    });
  }catch(e){}
}

// HAPTIC
function vibrate(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms||30); }catch(e){} }

// TYPEWRITER
function typewriter(el, text, speed=40){
  el.textContent = '';
  let i = 0;
  function type(){ if(i<text.length){ el.textContent+=text[i]; i++; setTimeout(type,speed); } }
  type();
}

// NAVIGATION
function goTo(page){
  if(page<1||page>5) return;
  document.querySelectorAll('.page').forEach((p,idx)=>{
    const num = idx+1;
    if(num===page) p.className='page center';
    else if(num<page) p.className='page left';
    else p.className='page right';
  });
  currentPage = page;
  onPageEnter(page);
}

const pageTexts = [
  'Mati y papá estaban comiendo un almuerzo delicioso. ¡Qué rico!',
  '¡Oh no! Después de comer, unos bichitos traviesos aparecieron entre los dientes. ¡Hay que sacarlos!',
  '¡Toca los bichitos verdes para limpiarlos con el cepillo!',
  '¡Ahora la lengua! Tócala 3 veces para cepillarla bien.',
  '¡Mati tiene los dientes súper limpios! ¡Papá está muy orgulloso! 🎉'
];

let enteredPages = new Set([1]);
function onPageEnter(page){
  if(!enteredPages.has(page)){
    enteredPages.add(page);
    const el = document.getElementById('text'+page);
    if(el) typewriter(el, pageTexts[page-1], 35);
  }
  if(page===5 && !page5Played){
    page5Played = true;
    setTimeout(()=>{ spawnConfetti(); playCelebration(); }, 400);
  }
}

// BICHITOS (PAGE 3)
const bichPositions = [
  {top:'28%',left:'10%'},{top:'30%',left:'30%'},{top:'28%',left:'50%'},{top:'30%',left:'70%'},
  {top:'58%',left:'14%'},{top:'60%',left:'34%'},{top:'58%',left:'54%'},{top:'60%',left:'74%'}
];

function createBichito(pos, i){
  const b = document.createElement('div');
  b.className = 'bichito';
  b.style.top = pos.top;
  b.style.left = pos.left;
  b.style.animationDelay = (i*0.1)+'s';

  b.innerHTML = `
    <div class="bichito-body">
      <div class="bichito-antenna left"></div>
      <div class="bichito-antenna right"></div>
      <div class="bichito-eye left"><div class="bichito-pupil"></div></div>
      <div class="bichito-eye right"><div class="bichito-pupil"></div></div>
      <div class="bichito-mouth"></div>
      <div class="bichito-leg l1"></div>
      <div class="bichito-leg l2"></div>
      <div class="bichito-leg l3"></div>
      <div class="bichito-leg r1"></div>
      <div class="bichito-leg r2"></div>
      <div class="bichito-leg r3"></div>
    </div>
  `;

  b.addEventListener('pointerdown', (e) => tapBichito(e, b));
  return b;
}

function createBichitos(){
  const area = document.getElementById('bichitosArea');
  area.innerHTML = '';
  bichitosLeft = 8;
  document.getElementById('nav3next').classList.add('hidden');
  bichPositions.forEach((pos, i) => {
    area.appendChild(createBichito(pos, i));
  });
}

function tapBichito(e, el){
  if(el.classList.contains('dead')) return;
  e.preventDefault(); e.stopPropagation();
  vibrate(30);
  playPop();

  // Splat particles
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  for(let i=0; i<10; i++){
    const p = document.createElement('div');
    p.className = 'splat';
    const angle = (Math.PI*2/10)*i;
    const dist = 25 + Math.random()*25;
    p.style.left = cx+'px';
    p.style.top = cy+'px';
    p.style.setProperty('--dx', Math.cos(angle)*dist+'px');
    p.style.setProperty('--dy', Math.sin(angle)*dist+'px');
    p.style.background = ['#7cfc00','#32cd32','#adff2f','#00fa9a','#98fb98'][i%5];
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 600);
  }

  // Brush animation
  const brush = document.createElement('div');
  brush.className = 'brush-anim';
  brush.style.left = (rect.left-10)+'px';
  brush.style.top = (rect.top-5)+'px';
  document.body.appendChild(brush);
  setTimeout(()=>brush.remove(), 500);

  // Foam bubbles
  for(let i=0; i<4; i++){
    const fb = document.createElement('div');
    fb.className = 'foam-bubble';
    fb.style.left = (cx-10+Math.random()*20)+'px';
    fb.style.top = (cy-10+Math.random()*20)+'px';
    fb.style.width = fb.style.height = (5+Math.random()*8)+'px';
    document.body.appendChild(fb);
    setTimeout(()=>fb.remove(), 1600);
  }

  // Kill bichito
  el.classList.add('dead');
  bichitosLeft--;

  if(bichitosLeft <= 0){
    setTimeout(()=>{
      playSuccess();
      // Shimmer
      const shimmer = document.createElement('div');
      shimmer.className = 'shimmer-overlay';
      document.getElementById('page3').appendChild(shimmer);
      setTimeout(()=>shimmer.remove(), 1400);
      // Success message
      const msg = document.createElement('div');
      msg.className = 'success-msg';
      msg.textContent = '¡Muy bien! ¡Dientes limpios!';
      document.getElementById('page3').appendChild(msg);
      setTimeout(()=>msg.remove(), 2500);
      // Show next
      document.getElementById('nav3next').classList.remove('hidden');
    }, 400);
  }
}

// TONGUE (PAGE 4)
function setupTongue(){
  tongueTaps = 0;
  document.querySelectorAll('.progress-dot').forEach(d=>d.classList.remove('filled'));
  document.getElementById('nav4next').classList.add('hidden');
  document.getElementById('tongueZone').addEventListener('pointerdown', tapTongue);
}

function tapTongue(e){
  if(tongueTaps>=3) return;
  e.preventDefault();
  vibrate(40);
  playPop();
  tongueTaps++;

  const dot = document.getElementById('dot'+(tongueTaps-1));
  if(dot) dot.classList.add('filled');

  // Foam
  const rect = e.target.getBoundingClientRect();
  for(let i=0;i<6;i++){
    const fb = document.createElement('div');
    fb.className = 'foam-bubble';
    fb.style.left = (rect.left+Math.random()*rect.width)+'px';
    fb.style.top = (rect.top+Math.random()*rect.height)+'px';
    fb.style.width = fb.style.height = (8+Math.random()*14)+'px';
    document.body.appendChild(fb);
    setTimeout(()=>fb.remove(), 1600);
  }

  if(tongueTaps>=3){
    setTimeout(()=>{
      playSuccess();
      document.getElementById('nav4next').classList.remove('hidden');
      const msg = document.createElement('div');
      msg.className = 'success-msg';
      msg.textContent = '¡Muy bien! ¡Lengua limpia!';
      document.getElementById('page4').appendChild(msg);
      setTimeout(()=>msg.remove(), 2500);
    }, 300);
  }
}

// CONFETTI (PAGE 5)
function spawnConfetti(){
  const colors = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#01a3a4','#f368e0','#ff9f43'];
  const page5El = document.getElementById('page5');
  for(let i=0;i<50;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100+'%';
    c.style.top = '-20px';
    c.style.background = colors[i%colors.length];
    c.style.setProperty('--dur', (1.5+Math.random()*2)+'s');
    c.style.animationDelay = (Math.random()*1.5)+'s';
    c.style.width = (6+Math.random()*8)+'px';
    c.style.height = (6+Math.random()*8)+'px';
    c.style.borderRadius = Math.random()>.5?'50%':'2px';
    page5El.appendChild(c);
    setTimeout(()=>c.remove(), 5000);
  }
  for(let i=0;i<12;i++){
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = (10+Math.random()*80)+'%';
    s.style.top = (10+Math.random()*60)+'%';
    s.style.animationDelay = (Math.random()*2)+'s';
    page5El.appendChild(s);
    setTimeout(()=>s.remove(), 6000);
  }
}

// INIT
function init(){
  typewriter(document.getElementById('text1'), pageTexts[0], 35);
  createBichitos();
  setupTongue();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
